# Vacation Scheduler - GitHub Actions CI/CD Pipeline
# Builds the Android APK and deploys to GitHub Pages

name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Set up Java 11 ──────────────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── Set up Android SDK with sdkmanager in PATH ───────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 36
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-36" "build-tools;34.0.0"

      # ── Build the debug APK ──────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK was produced
        run: ls -lh app/build/outputs/apk/debug/

      # ── Assemble GitHub Pages deployment directory ───────────────────────────
      - name: Prepare GitHub Pages directory
        run: |
          mkdir -p gh-pages
          cp app/build/outputs/apk/debug/app-debug.apk gh-pages/VacationScheduler.apk
          cp deploy/index.html gh-pages/index.html

      # ── Deploy to GitHub Pages ───────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
          commit_message: "Deploy Vacation Scheduler APK - ${{ github.sha }}"
